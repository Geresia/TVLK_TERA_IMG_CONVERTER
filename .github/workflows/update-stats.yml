name: Update Visitor Stats

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install GA4 client
        run: pip install google-analytics-data

      - name: Fetch GA4 stats and update README
        env:
          GA4_CREDENTIALS: ${{ secrets.GA4_CREDENTIALS }}
          GA4_PROPERTY_ID: "15211741296"
        run: |
          python3 - <<'EOF'
          import os, json, re
          from datetime import datetime, timezone
          from google.analytics.data_v1beta import BetaAnalyticsDataClient
          from google.analytics.data_v1beta.types import (
              RunReportRequest, DateRange, Dimension, Metric, OrderBy
          )
          from google.oauth2 import service_account

          creds_info = json.loads(os.environ['GA4_CREDENTIALS'])
          credentials = service_account.Credentials.from_service_account_info(
              creds_info,
              scopes=['https://www.googleapis.com/auth/analytics.readonly'],
          )
          client = BetaAnalyticsDataClient(credentials=credentials)

          request = RunReportRequest(
              property=f"properties/{os.environ['GA4_PROPERTY_ID']}",
              dimensions=[Dimension(name='date')],
              metrics=[
                  Metric(name='screenPageViews'),
                  Metric(name='totalUsers'),
              ],
              date_ranges=[DateRange(start_date='2026-07-01', end_date='today')],
              order_bys=[OrderBy(dimension=OrderBy.DimensionOrderBy(dimension_name='date'))],
          )
          response = client.run_report(request)

          rows = []
          total_views = 0
          total_users = 0

          for row in response.rows:
              raw_date = row.dimension_values[0].value  # YYYYMMDD
              date = f"{raw_date[:4]}-{raw_date[4:6]}-{raw_date[6:]}"
              views = int(row.metric_values[0].value)
              users = int(row.metric_values[1].value)
              if views == 0:
                  continue
              rows.append(f"| {date} | {views} | {users} |")
              total_views += views
              total_users = max(total_users, users)

          if not rows:
              rows.append("| — | — | — |")

          today = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          table = "\n".join([
              "| Date | Views | Unique Visitors |",
              "|------|-------|----------------|",
              *rows,
              f"| **Total** | **{total_views}** | **{total_users}** |",
              "",
              f"*Last updated: {today}*",
          ])

          with open('README.md') as f:
              readme = f.read()

          new_readme = re.sub(
              r'<!-- STATS_START -->.*?<!-- STATS_END -->',
              f'<!-- STATS_START -->\n{table}\n<!-- STATS_END -->',
              readme,
              flags=re.DOTALL,
          )

          with open('README.md', 'w') as f:
              f.write(new_readme)

          print("README updated with GA4 data.")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update visitor stats from GA4"
          git push
