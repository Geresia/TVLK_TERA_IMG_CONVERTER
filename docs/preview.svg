<svg width="760" height="520" viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="520" fill="#f1f5f9" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="760" height="48" fill="#3b82f6" rx="10"/>
  <rect x="0" y="28" width="760" height="20" fill="#3b82f6"/>
  <text x="20" y="30" font-size="14" font-weight="600" fill="white" letter-spacing="0.5">TERA Image Converter</text>

  <!-- DropZone -->
  <rect x="16" y="64" width="728" height="100" rx="12" fill="white" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="380" y="102" font-size="24" text-anchor="middle">📂</text>
  <text x="380" y="128" font-size="13" text-anchor="middle" fill="#475569">
    <tspan font-weight="600" fill="#3b82f6">Click</tspan>
    <tspan fill="#475569"> or </tspan>
    <tspan font-weight="600" fill="#3b82f6">drag</tspan>
    <tspan fill="#475569"> images here</tspan>
  </text>
  <text x="380" y="148" font-size="11" text-anchor="middle" fill="#94a3b8">JPG · PNG · WEBP · BMP · GIF · Multiple files supported</text>

  <!-- URL input -->
  <rect x="16" y="176" width="660" height="28" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="194" font-size="11" fill="#94a3b8">Paste image URL and press Enter</text>
  <rect x="684" y="176" width="60" height="28" rx="8" fill="#475569"/>
  <text x="714" y="194" font-size="11" text-anchor="middle" fill="white" font-weight="500">Add</text>

  <!-- Toolbar -->
  <text x="32" y="234" font-size="11" fill="#94a3b8">Done 3  ·  click a file to preview</text>
  <!-- 2x Upscale button -->
  <rect x="380" y="220" width="90" height="26" rx="8" fill="#8b5cf6"/>
  <text x="425" y="237" font-size="11" text-anchor="middle" fill="white" font-weight="500">✦ 2x Upscale ON</text>
  <!-- Clear button -->
  <rect x="478" y="220" width="46" height="26" rx="8" fill="#e2e8f0"/>
  <text x="501" y="237" font-size="11" text-anchor="middle" fill="#475569" font-weight="500">Clear</text>
  <!-- Save As button -->
  <rect x="532" y="220" width="58" height="26" rx="8" fill="#475569"/>
  <text x="561" y="237" font-size="11" text-anchor="middle" fill="white" font-weight="500">Save As</text>
  <!-- Save button -->
  <rect x="598" y="220" width="46" height="26" rx="8" fill="#3b82f6"/>
  <text x="621" y="237" font-size="11" text-anchor="middle" fill="white" font-weight="600">Save</text>

  <!-- File List -->
  <rect x="16" y="258" width="728" height="244" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- File row 1 - ok, hovered -->
  <rect x="17" y="259" width="726" height="52" rx="11" fill="#f8fafc"/>
  <rect x="16" y="299" width="728" height="1" fill="#f1f5f9"/>
  <text x="36" y="289" font-size="16">✅</text>
  <text x="64" y="289" font-size="12" fill="#334155">hotel_exterior_01.jpg</text>
  <text x="620" y="289" font-size="11" fill="#94a3b8" text-anchor="end">2.3 MB</text>
  <text x="740" y="289" font-size="11" fill="#10b981" text-anchor="end" font-weight="500">1920×1280 (3:2)</text>

  <!-- File row 2 - ok -->
  <rect x="16" y="311" width="728" height="52" fill="white"/>
  <rect x="16" y="351" width="728" height="1" fill="#f1f5f9"/>
  <text x="36" y="341" font-size="16">✅</text>
  <text x="64" y="341" fill="#334155" font-size="12">room_deluxe_twin.png</text>
  <text x="620" y="341" font-size="11" fill="#94a3b8" text-anchor="end">4.1 MB</text>
  <text x="740" y="341" font-size="11" fill="#10b981" text-anchor="end" font-weight="500">1281×1281 (1:1)</text>

  <!-- File row 3 - ok -->
  <rect x="16" y="363" width="728" height="52" fill="white"/>
  <rect x="16" y="403" width="728" height="1" fill="#f1f5f9"/>
  <text x="36" y="393" font-size="16">✅</text>
  <text x="64" y="393" fill="#334155" font-size="12">lobby_panorama.jpg</text>
  <text x="620" y="393" font-size="11" fill="#94a3b8" text-anchor="end">5.8 MB</text>
  <text x="740" y="393" font-size="11" fill="#10b981" text-anchor="end" font-weight="500">2048×1152 (16:9)</text>

  <!-- File row 4 - pending -->
  <rect x="16" y="415" width="728" height="52" fill="white"/>
  <text x="36" y="445" font-size="16">🖼️</text>
  <text x="64" y="445" fill="#334155" font-size="12">pool_area.jpg</text>
  <text x="620" y="445" font-size="11" fill="#94a3b8" text-anchor="end">3.2 MB</text>
  <text x="740" y="445" font-size="11" fill="#94a3b8" text-anchor="end" font-weight="500">Pending</text>

  <!-- bottom rounded corners fix -->
  <path d="M16 488 Q16 502 28 502 H732 Q744 502 744 488 V484 H16 Z" fill="white"/>

  <!-- Preview modal overlay (semi-transparent) -->
  <rect x="0" y="0" width="760" height="520" fill="black" opacity="0.5" rx="10"/>

  <!-- Preview modal -->
  <rect x="60" y="60" width="640" height="400" rx="16" fill="white"/>
  <!-- Modal header -->
  <rect x="60" y="60" width="640" height="48" rx="16" fill="white"/>
  <rect x="60" y="88" width="640" height="20" fill="white"/>
  <text x="80" y="90" font-size="13" font-weight="600" fill="#334155">hotel_exterior_01.jpg</text>
  <text x="684" y="90" font-size="20" fill="#94a3b8" text-anchor="middle">×</text>
  <line x1="60" y1="108" x2="700" y2="108" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Before panel -->
  <text x="88" y="132" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">ORIGINAL</text>
  <rect x="72" y="142" width="268" height="200" rx="10" fill="#f8fafc"/>
  <!-- Placeholder image -->
  <rect x="92" y="162" width="228" height="160" rx="6" fill="#e2e8f0"/>
  <text x="206" y="248" font-size="28" text-anchor="middle">🏨</text>
  <text x="88" y="360" font-size="11" fill="#94a3b8">2.3 MB</text>

  <!-- After panel -->
  <text x="392" y="132" font-size="10" font-weight="600" fill="#3b82f6" letter-spacing="1">CONVERTED</text>
  <rect x="376" y="142" width="268" height="200" rx="10" fill="#f8fafc"/>
  <!-- Placeholder image (slightly different crop) -->
  <rect x="396" y="162" width="228" height="152" rx="6" fill="#e2e8f0"/>
  <text x="510" y="244" font-size="28" text-anchor="middle">🏨</text>
  <text x="392" y="360" font-size="11" fill="#94a3b8">1920×1280 · 3:2</text>
</svg>
