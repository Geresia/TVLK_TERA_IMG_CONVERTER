<svg width="760" height="480" viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="760" height="480" fill="#f1f5f9" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="760" height="48" fill="#3b82f6" rx="10"/>
  <rect x="0" y="28" width="760" height="20" fill="#3b82f6"/>
  <text x="20" y="30" font-size="14" font-weight="600" fill="white" letter-spacing="0.5">TERA Image Converter</text>

  <!-- DropZone -->
  <rect x="16" y="64" width="728" height="120" rx="12" fill="white" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="380" y="112" font-size="28" text-anchor="middle">📂</text>
  <text x="380" y="142" font-size="13" text-anchor="middle" fill="#475569">
    <tspan font-weight="600" fill="#3b82f6">Click</tspan>
    <tspan fill="#475569"> or </tspan>
    <tspan font-weight="600" fill="#3b82f6">drag</tspan>
    <tspan fill="#475569"> images here</tspan>
  </text>
  <text x="380" y="162" font-size="11" text-anchor="middle" fill="#94a3b8">JPG · PNG · WEBP · BMP · GIF · Multiple files supported</text>

  <!-- Toolbar -->
  <text x="32" y="218" font-size="11" fill="#94a3b8">3 files · 3 pending</text>
  <!-- Clear button -->
  <rect x="554" y="203" width="42" height="26" rx="8" fill="#e2e8f0"/>
  <text x="575" y="220" font-size="11" text-anchor="middle" fill="#475569" font-weight="500">Clear</text>
  <!-- Output folder button -->
  <rect x="604" y="203" width="108" height="26" rx="8" fill="#475569"/>
  <text x="658" y="220" font-size="11" text-anchor="middle" fill="white" font-weight="500">📁 output</text>
  <!-- Convert button -->
  <rect x="720" y="203" width="64" height="26" rx="8" fill="#3b82f6"/>
  <text x="752" y="220" font-size="11" text-anchor="middle" fill="white" font-weight="600">▶ Convert</text>

  <!-- File List -->
  <rect x="16" y="240" width="728" height="220" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>

  <!-- File row 1 - ok -->
  <rect x="16" y="240" width="728" height="52" rx="12" fill="white"/>
  <rect x="16" y="280" width="728" height="1" fill="#f1f5f9"/>
  <text x="36" y="270" font-size="16">✅</text>
  <text x="64" y="270" font-size="12" fill="#334155">hotel_exterior_01.jpg</text>
  <text x="620" y="270" font-size="11" fill="#94a3b8" text-anchor="end">2.3 MB</text>
  <text x="740" y="270" font-size="11" fill="#10b981" text-anchor="end" font-weight="500">1920×1280 (3:2)</text>

  <!-- File row 2 - ok -->
  <rect x="16" y="292" width="728" height="52" fill="white"/>
  <rect x="16" y="332" width="728" height="1" fill="#f1f5f9"/>
  <text x="36" y="322" font-size="16">✅</text>
  <text x="64" y="322" fill="#334155" font-size="12">room_deluxe_twin.png</text>
  <text x="620" y="322" font-size="11" fill="#94a3b8" text-anchor="end">4.1 MB</text>
  <text x="740" y="322" font-size="11" fill="#10b981" text-anchor="end" font-weight="500">1281×1281 (1:1)</text>

  <!-- File row 3 - processing -->
  <rect x="16" y="344" width="728" height="52" fill="white"/>
  <text x="36" y="374" font-size="16">⏳</text>
  <text x="64" y="374" fill="#334155" font-size="12">lobby_panorama.jpg</text>
  <text x="620" y="374" font-size="11" fill="#94a3b8" text-anchor="end">5.8 MB</text>
  <text x="740" y="374" font-size="11" fill="#3b82f6" text-anchor="end" font-weight="500">Processing...</text>

  <!-- bottom rounded corners fix -->
  <path d="M16 452 Q16 460 24 460 H736 Q744 460 744 452 V448 H16 Z" fill="white"/>
</svg>
